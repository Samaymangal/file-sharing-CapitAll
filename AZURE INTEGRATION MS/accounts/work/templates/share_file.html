
{% extends "base.html" %}
{% block content %}
<div style="max-width:480px; margin:3rem auto; padding:2rem;
            background:#1e1e2e; border-radius:12px;">
  <h1 style="font-size:1.6rem; font-weight:700; margin-bottom:0.4rem;">
    Share "{{ file.title }}" 🔗
  </h1>
  <p style="color:#888; margin-bottom:1.5rem;">
    Enter the email of the person you want to share with.
  </p>

  {% if error %}
    <p style="color:#f87171; background:#3b0000; padding:0.7rem 1rem;
              border-radius:6px; margin-bottom:1rem;">{{ error }}</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <label style="display:block; font-size:0.85rem; color:#aaa;
                  text-transform:uppercase; margin-bottom:0.4rem;">
      Recipient Email
    </label>
    <input type="email" name="email" placeholder="colleague@capitall.io" required
           style="width:100%; padding:0.7rem 1rem; border-radius:8px;
                  border:1px solid #374151; background:#111827;
                  color:#fff; font-size:1rem; margin-bottom:1.2rem;">
    <div style="display:flex; gap:1rem;">
      <button type="submit"
              style="background:#059669; color:#fff; border:none; padding:0.7rem 1.6rem;
                     border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer;">
        Share →
      </button>
      <a href="{% url 'file_list' %}"
         style="background:#374151; color:#fff; padding:0.7rem 1.4rem;
                border-radius:8px; text-decoration:none; font-weight:600;">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
